<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Pokéball outline -->
  <circle cx="50" cy="50" r="45" stroke="#4ade80" stroke-width="3" fill="none" opacity="0.4"/>
  <!-- Top half -->
  <path d="M5 50 A45 45 0 0 1 95 50" stroke="#4ade80" stroke-width="3" fill="none" opacity="0.4"/>
  <!-- Centre line -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="#4ade80" stroke-width="3" opacity="0.4"/>
  <!-- Centre button -->
  <circle cx="50" cy="50" r="10" stroke="#4ade80" stroke-width="3" fill="none" opacity="0.4"/>
  <circle cx="50" cy="50" r="4" fill="#4ade80" opacity="0.4"/>
  <!-- Question mark for missing data -->
  <text x="50" y="30" text-anchor="middle" font-family="monospace" font-size="12" fill="#4ade80" opacity="0.6">?</text>
</svg>
